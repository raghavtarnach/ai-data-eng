version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-data-eng-postgres
    environment:
      POSTGRES_DB: ai_data_eng
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
